name: Coolify Auto-Update Check
on:
  schedule:
    - cron: '0 * * * *' # Chạy tự động mỗi giờ một lần
  workflow_dispatch:      # Cho phép bạn bấm nút chạy thủ công bất cứ lúc nào

jobs:
  check-updates:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Cần quyền này để commit file apps_state.json.enc ngược lại repo

    steps:
      - name: Checkout Tool Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Lấy toàn bộ lịch sử để tránh lỗi khi pull/rebase

      - name: Install regctl
        run: |
          # Cài đặt công cụ regctl để kiểm tra Image Digest từ Docker Registry
          curl -L -s https://github.com/regclient/regclient/releases/latest/download/regctl-linux-amd64 > regctl
          chmod +x regctl
          sudo mv regctl /usr/local/bin/

      - name: Run Update Script
        env:
          # Các thông tin nhạy cảm lấy từ GitHub Secrets
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_URL: ${{ secrets.COOLIFY_URL }}
          MY_CONFIG_PAT: ${{ secrets.MY_CONFIG_PAT }}
          CONFIG_URL: ${{ secrets.CONFIG_URL }}
          NTFY_URL: ${{ secrets.NTFY_URL }}        # 👈 URL của Ntfy (ví dụ: https://ntfy.sh/topic_secret_cua_ban)
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}    # (Tùy chọn) Thêm nếu ntfy server yêu cầu Token
        run: |
          echo "::add-mask::$NTFY_URL"
          [ -n "$NTFY_TOKEN" ] && echo "::add-mask::$NTFY_TOKEN"

          # Chạy script xử lý chính
          bash check_and_deploy.sh

      - name: Commit & Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Chỉ làm việc với file đã mã hóa (.enc)
          # Xóa file thô apps_state.json nếu nó lỡ xuất hiện để đảm bảo an toàn
          [ -f "apps_state.json" ] && rm -f apps_state.json
          
          # Kiểm tra xem file mã hóa có thay đổi nội dung không
          if [[ -n $(git status --porcelain apps_state.json.enc) ]]; then
            echo "🚀 State changed, committing updates..."
            git add apps_state.json.enc
            git commit -m "chore: update encrypted state [skip ci]"
            git pull --rebase origin main
            git push -q
          else
            echo "✅ No changes in image digests. Nothing to commit."
          fi
